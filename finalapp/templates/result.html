<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Career Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(to right, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tight mb-4 gradient-text">Prediction Results</h1>
            <p class="text-lg text-slate-400">Based on our advanced ML analysis of your technical skills and personality traits, here are the most suited careers for you.</p>
        </div>

        <div class="glass-panel rounded-3xl p-8 sm:p-12 relative overflow-hidden">
            <!-- Decorative blobs -->
            <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-blue-500/10 blur-3xl pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-64 h-64 rounded-full bg-emerald-500/10 blur-3xl pointer-events-none"></div>
            
            <div class="relative z-10 space-y-6">
                <!-- Top Match -->
                <div class="bg-gradient-to-r from-blue-600/20 to-emerald-600/20 border border-blue-500/30 rounded-2xl p-8 text-center transform transition duration-500 hover:scale-[1.02]">
                    <div class="uppercase tracking-widest text-sm font-semibold text-blue-400 mb-2">Top Recommendation</div>
                    <h2 class="text-4xl sm:text-5xl font-bold text-white mb-2">{{result}}</h2>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-8">
                    <!-- 2nd Match -->
                    <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 text-center hover:bg-slate-800 transition-colors">
                        <div class="uppercase tracking-widest text-xs font-semibold text-slate-400 mb-2">2nd Best Match</div>
                        <h3 class="text-2xl font-bold text-slate-200">{{y}}</h3>
                    </div>

                    <!-- 3rd Match -->
                    <div class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 text-center hover:bg-slate-800 transition-colors">
                        <div class="uppercase tracking-widest text-xs font-semibold text-slate-400 mb-2">3rd Best Match</div>
                        <h3 class="text-2xl font-bold text-slate-200">{{z}}</h3>
                    </div>
                </div>
            </div>

            <div class="mt-12 text-center relative z-10">
                <a href="/" class="inline-flex items-center justify-center bg-slate-700 hover:bg-slate-600 text-white font-medium py-3 px-8 rounded-full transition-colors border border-slate-600 hover:border-slate-500">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Take Questionnaire Again
                </a>
            </div>
        </div>
    </div>

</body>
</html>
